# ============================================================
# LitPlay API Gateway (§5)
# NGINX reverse proxy with JWT validation, rate limiting, and CORS.
# In production this is AWS API Gateway + WAF (see infra/terraform/main.tf).
# This config is for the docker-compose dev environment.
# ============================================================

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # Rate limiting (§27.3 rule 1)
  limit_req_zone $binary_remote_addr zone=unauth:10m rate=100r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=1000r/m;

  upstream auth_service { server auth-service:3000; }
  upstream progress_service { server progress-service:3000; }
  upstream content_service { server content-service:3000; }
  upstream classroom_service { server classroom-service:3000; }
  upstream notification_service { server notification-service:3000; }
  upstream asr_service { server asr-service:8080; }

  server {
    listen 80;
    server_name api.litplay.app;

    # CORS (§27.3 rule 4)
    add_header 'Access-Control-Allow-Origin' 'https://app.litplay.app' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

    # Auth service
    location /api/v1/auth/ {
      limit_req zone=unauth burst=10 nodelay;
      proxy_pass http://auth_service;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $request_id;
    }

    # Progress service (authenticated)
    location /api/v1/progress/ {
      limit_req zone=auth burst=20 nodelay;
      proxy_pass http://progress_service;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $request_id;
    }

    # Content service
    location /api/v1/content/ {
      limit_req zone=auth burst=20 nodelay;
      proxy_pass http://content_service;
      proxy_set_header Host $host;
    }

    # Classroom service
    location /api/v1/classrooms/ {
      limit_req zone=auth burst=20 nodelay;
      proxy_pass http://classroom_service;
      proxy_set_header Host $host;
    }

    # Notification service
    location /api/v1/notifications/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://notification_service;
      proxy_set_header Host $host;
    }

    # ASR service (certificate pinning recommended in production §27.2)
    location /api/v1/asr/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://asr_service;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $request_id;
    }
  }
}
