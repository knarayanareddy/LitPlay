# ============================================================
# LitPlay CI/CD Pipeline (§26)
#
# PR → lint, typecheck, unit tests, security scan, build
# dev merge → deploy to dev environment
# main merge → deploy to staging, full E2E
# manual → production promote with canary
# ============================================================

name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # --- Node.js services ---
  node-checks:
    name: Node.js - Lint, Typecheck, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build shared packages
        run: |
          npx tsc -p packages/contracts/tsconfig.json
          npx tsc -p packages/server-kit/tsconfig.json

      - name: Typecheck all services
        run: |
          for svc in auth-service progress-service content-service classroom-service notification-service; do
            echo "::group::Typecheck $svc"
            npx tsc -p services/$svc/tsconfig.json --noEmit
            echo "::endgroup::"
          done

      - name: Run unit tests
        run: |
          for svc in auth-service progress-service content-service classroom-service notification-service; do
            echo "::group::Tests $svc"
            npx jest --config services/$svc/jest.config.cjs --coverage
            echo "::endgroup::"
          done

  # --- Mobile client ---
  mobile-checks:
    name: Mobile - Typecheck and Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'mobile/package-lock.json'

      - name: Install mobile dependencies
        run: npm ci --prefix mobile --legacy-peer-deps

      - name: Typecheck mobile
        run: npm run typecheck --prefix mobile

      - name: Mobile audit
        run: npm audit --prefix mobile --audit-level=high

  # --- Python ASR service ---
  asr-checks:
    name: ASR Service - Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/asr-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e '.[dev]'

      - name: Run ASR scoring tests (§29.2 ≥95% coverage)
        run: |
          python -m pytest tests/ -v --tb=short -q

  # --- Python Analytics service ---
  analytics-checks:
    name: Analytics Service - Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/analytics-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e '.[dev]'

      - name: Run analytics tests
        run: |
          python -m pytest tests/ -v --tb=short -q

  # --- Security scan (§27) ---
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Blocking npm audit
        run: npm audit --audit-level=high

      - name: Run Snyk (dependency audit, if token configured)
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: false

      - name: Run Trivy (container scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
        continue-on-error: false

  # --- Build Docker images ---
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [node-checks, mobile-checks, asr-checks, analytics-checks, security-scan]
    strategy:
      matrix:
        service: [auth-service, progress-service, content-service, classroom-service, notification-service]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.node
          build-args: SERVICE_NAME=${{ matrix.service }}
          push: false
          tags: litplay/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build asr-service
        if: matrix.service == 'auth-service'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.asr
          push: false
          tags: litplay/asr-service:${{ github.sha }}

  # --- Deploy to dev on dev-branch merge ---
  deploy-dev:
    name: Deploy to Dev
    needs: [build-images]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - run: echo "Deploy to dev environment — canary 5%, monitor, full deploy"
